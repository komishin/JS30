<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speech Detection</title>
  <link rel="icon" href="https://fav.farm/✅" />
</head>
<body>

  <div class="words" contenteditable>
  </div>

<script>
  window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  const recognition = new SpeechRecognition();
  recognition.interimResults = true;
  recognition.lang = 'ja-JP';

  // --- 修正ポイント1: タイマー変数と「自動再開フラグ」を定義 ---
  let silenceTimer; 
  let isAutoRestartEnabled = true; 

  let p = document.createElement('p');
  const words = document.querySelector('.words');
  words.appendChild(p);

  recognition.addEventListener('result', e => {
    const transcript = Array.from(e.results)
      .map(result => result[0])
      .map(result => result.transcript)
      .join('');

    // --- 5秒間の沈黙タイマー処理 ---
    clearTimeout(silenceTimer);

    silenceTimer = setTimeout(() => {
      console.log("5秒間沈黙したため、認識を完全に停止します");
      
      // --- 修正ポイント2: 5秒経ったら「自動再開」を禁止にする ---
      isAutoRestartEnabled = false;
      recognition.stop();

      const status = document.createElement('p');
      status.style.color = 'red';
      status.textContent = '【5秒経過：自動停止しました】';
      words.appendChild(status);
    }, 5000);

    // 💩変換と表示
    const poopScript = transcript.replace(/おはよう|poo|shit|dump/gi, '💩');
    p.textContent = poopScript;

    if (e.results[0].isFinal) {
      p = document.createElement('p');
      words.appendChild(p);
    }
  });

  // --- 修正ポイント3: フラグが true の時だけ再起動するようにする ---
  recognition.addEventListener('end', () => {
    if (isAutoRestartEnabled) {
      setTimeout(() => recognition.start(), 100);
    }
  });

  recognition.start();

</script>


  <style>
    html {
      font-size: 10px;
    }

    body {
      background: #ffc600;
      font-family: 'helvetica neue';
      font-weight: 200;
      font-size: 20px;
    }

    .words {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      border-radius: 5px;
      box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
      padding: 1rem 2rem 1rem 5rem;
      background: -webkit-gradient(linear, 0 0, 0 100%, from(#d9eaf3), color-stop(4%, #fff)) 0 4px;
      background-size: 100% 3rem;
      position: relative;
      line-height: 3rem;
    }

    p {
      margin: 0 0 3rem;
    }

    .words:before {
      content: '';
      position: absolute;
      width: 4px;
      top: 0;
      left: 30px;
      bottom: 0;
      border: 1px solid;
      border-color: transparent #efe4e4;
    }
  </style>

</body>
</html>
